<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네트워크 진단</title>
<style>
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; background: #0d0e10; color: #ECEDEE; padding: 24px; max-width: 640px; margin: 0 auto; line-height: 1.7; }
  h1 { font-size: 18px; margin-bottom: 4px; }
  .sub { color: #9A9DA3; font-size: 12px; margin-bottom: 20px; word-break: break-all; }
  .test { background: #16171a; border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .name { font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; gap: 8px; }
  .detail { font-size: 12px; color: #9A9DA3; margin-top: 4px; word-break: break-all; }
  .ok { color: #4ade80; } .fail { color: #f87171; } .wait { color: #9A9DA3; }
  .summary { margin-top: 16px; padding: 14px 16px; border-radius: 12px; background: #1c1d21; font-size: 13px; }
</style>
</head>
<body>
<h1>서울 지하철 라이브 · 네트워크 진단</h1>
<div class="sub" id="env"></div>
<div id="tests"></div>
<div class="summary" id="summary">진단 중...</div>
<div class="test" style="margin-top:10px">
  <div class="name">7. 네이버 지도 실제 렌더링<span class="wait" id="t7s">5번 이후 시작</span></div>
  <div class="detail">아래 박스에 지도가 그려지면 정상입니다.</div>
  <div id="navermap" style="width:100%;height:240px;border-radius:8px;margin-top:10px;background:#222"></div>
</div>
<script>
document.getElementById("env").textContent = location.href + " · " + navigator.userAgent;
const tests = [
  { id: "t1", name: "1. 같은 도메인 프록시 (fetch)", run: async () => {
      const r = await fetch("/api/position?probe=1");
      const j = await r.json();
      return `HTTP ${r.status} · region=${j.region} · key=${j.ok}`;
  }},
  { id: "t2", name: "2. 열린데이터광장 직접 (fetch)", run: async () => {
      const r = await fetch("https://swopenapi.seoul.go.kr/api/subway/sample/json/realtimePosition/0/5/2호선");
      const j = await r.json();
      return `HTTP ${r.status} · code=${(j.errorMessage && j.errorMessage.code) || j.code || "?"}`;
  }},
  { id: "t3", name: "3. 지도 타일 이미지 (img 태그)", run: () => new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(`로드 성공 (${img.naturalWidth}px)`);
      img.onerror = () => rej(new Error("이미지 로드 차단"));
      img.src = "https://a.basemaps.cartocdn.com/dark_all/11/1745/793.png?d=" + Date.now();
      setTimeout(() => rej(new Error("8초 시간 초과")), 8000);
  })},
  { id: "t4", name: "4. 지도 타일 (fetch)", run: async () => {
      const r = await fetch("https://a.basemaps.cartocdn.com/dark_all/11/1745/793.png?f=" + Date.now());
      return `HTTP ${r.status} · ${r.headers.get("content-type")}`;
  }},
  { id: "t5", name: "5. 네이버 지도 스크립트 (script 태그)", run: () => new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=7dklj0rqzc";
      window.navermap_authFailure = () => rej(new Error("스크립트 로드됨, 인증 실패 (URL 미등록)"));
      s.onload = () => setTimeout(() => {
        if (window.naver && window.naver.maps) res("로드 + 인증 성공 (4초 내 실패 없음)");
      }, 4000);
      s.onerror = () => rej(new Error("스크립트 로드 차단"));
      document.head.appendChild(s);
      setTimeout(() => rej(new Error("8초 시간 초과")), 8000);
  })},
  { id: "t6", name: "6. cdnjs (fetch)", run: async () => {
      const r = await fetch("https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css");
      return `HTTP ${r.status}`;
  }}
];
const box = document.getElementById("tests");
tests.forEach(t => {
  const d = document.createElement("div");
  d.className = "test";
  d.innerHTML = `<div class="name">${t.name}<span class="wait" id="${t.id}s">대기</span></div><div class="detail" id="${t.id}d"></div>`;
  box.appendChild(d);
});
(async () => {
  const results = {};
  for (const t of tests) {
    const s = document.getElementById(t.id + "s"), dt = document.getElementById(t.id + "d");
    s.textContent = "진행 중"; 
    try {
      const msg = await t.run();
      s.textContent = "성공"; s.className = "ok"; dt.textContent = msg; results[t.id] = true;
    } catch (e) {
      s.textContent = "실패"; s.className = "fail";
      dt.textContent = `${e.name}: ${e.message}`;
      results[t.id] = false;
    }
  }
  /* 7번: 실제 지도 렌더 */
  const t7 = document.getElementById("t7s");
  if (window.naver && window.naver.maps) {
    try {
      new naver.maps.Map("navermap", { center: new naver.maps.LatLng(37.5665, 126.9780), zoom: 12 });
      t7.textContent = "지도 생성됨 (박스 확인)"; t7.className = "ok";
    } catch (e) { t7.textContent = "생성 실패: " + e.message; t7.className = "fail"; }
  } else { t7.textContent = "스크립트 없음"; t7.className = "fail"; }
  let verdict;
  if (results.t1 && results.t4) verdict = "페이지 내부 요청이 모두 정상입니다. 본 앱이 안 된다면 캐시 문제일 수 있으니 강력 새로고침(Ctrl+Shift+R)을 해보세요.";
  else if (!results.t1 && results.t6) verdict = "외부 CDN은 되는데 같은 도메인 API 호출이 막힙니다. 보안 확장이나 네트워크 장비가 fetch 요청을 선별 차단 중일 가능성이 큽니다.";
  else if (results.t3 && !results.t4) verdict = "이미지 로드는 되는데 fetch만 막힙니다. 확장 프로그램 또는 보안 소프트웨어가 fetch/XHR을 차단 중입니다. 시크릿 창이나 다른 기기에서 시도해 보세요.";
  else if (!results.t3 && !results.t4 && !results.t6) verdict = "외부 도메인 전체가 차단되고 있습니다. 회사망/프록시 환경일 가능성이 높습니다. 휴대폰 셀룰러로 시도해 보세요.";
  else verdict = "일부 도메인만 선별 차단되고 있습니다. 위 결과 화면을 캡처해서 공유해 주세요.";
  document.getElementById("summary").textContent = "진단 결과: " + verdict;
})();
</script>
</body>
</html>
